<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>dogevisual</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Helvetica, Arial, sans-serif;
}

/* layout */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== TITLE ===== */

.title{
    font-size:78px;
    font-weight:300; /* 更细 */
    letter-spacing:-2px;
    display:flex;
}

/* doge = clean white */
.doge{
    color:#fff;
    font-weight:300;
}

/* visual = subtle Apple intelligence dots */
.visual{
    font-weight:300;
    margin-left:2px;

    background: linear-gradient(
        90deg,
        #4da3ff,
        #a855f7,
        #ff4fd8
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    opacity:0.95;
}

/* ===== SUB ===== */

.sub{
    margin-top:14px;
    font-size:15px;
    color:rgba(255,255,255,0.55);
    letter-spacing:0.2px;
    font-weight:300;
}

/* ===== GLASS BUTTON ===== */

.glass{
    margin-top:28px;
    padding:12px 26px;

    border-radius:999px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);

    color:white;
    font-weight:300;

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    position:relative;
    overflow:hidden;

    cursor:pointer;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);

    transition:0.2s ease;
}

/* soft cursor light */
.glass::before{
    content:"";
    position:absolute;
    inset:0;

    background: radial-gradient(
        180px circle at var(--x,50%) var(--y,50%),
        rgba(255,255,255,0.25),
        transparent 60%
    );

    opacity:0;
    transition:opacity 0.2s;
}

.glass:hover::before{
    opacity:1;
}

.glass:hover{
    background:rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <span class="doge">doge</span>
        <span class="visual">visual</span>
    </div>

    <div class="sub">
        local intelligence. privacy-first. no cloud.
    </div>

    <div class="glass" id="glass">
        enter intelligence
    </div>

</div>

<script>

const glass = document.getElementById("glass");

glass.addEventListener("mousemove", (e) => {

    const rect = glass.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    glass.style.setProperty("--x", x + "px");
    glass.style.setProperty("--y", y + "px");

});

</script>

</body>
</html>
