<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>dogevisual</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Helvetica, Arial, sans-serif;
    overflow:hidden;
}

/* layout */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== TITLE (NO ANIMATION) ===== */

.title{
    font-size:78px;
    font-weight:300;
    letter-spacing:-2px;
    display:flex;
}

.doge{
    color:#fff;
}

/* Apple Intelligence gradient (static) */
.visual{
    font-weight:300;

    background: linear-gradient(
        90deg,
        #4da3ff,
        #a855f7,
        #ff4fd8,
        #ffd84d
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== SUB ===== */

.sub{
    margin-top:14px;
    font-size:15px;
    color:rgba(255,255,255,0.55);
    font-weight:300;
}

/* ===== GLASS ===== */

.glass{
    margin-top:28px;
    padding:12px 26px;
    border-radius:999px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);

    color:white;
    font-weight:300;

    position:relative;
    overflow:hidden;

    cursor:pointer;
}

/* LIGHT LAYER */
.glass::before{
    content:"";
    position:absolute;
    inset:0;

    background: radial-gradient(
        180px circle at var(--x,50%) var(--y,50%),
        rgba(255,255,255,0.22),
        transparent 60%
    );

    pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <span class="doge">doge</span>
        <span class="visual">visual</span>
    </div>

    <div class="sub">
        local intelligence. privacy-first. no cloud.
    </div>

    <div class="glass" id="glass">
        enter intelligence
    </div>

</div>

<script>

/* ===== optimized mouse tracking (no lag) ===== */

const glass = document.getElementById("glass");

let mouseX = 0;
let mouseY = 0;
let rect = glass.getBoundingClientRect();

function updateRect(){
    rect = glass.getBoundingClientRect();
}
window.addEventListener("resize", updateRect);

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

function animate(){
    glass.style.setProperty("--x", mouseX + "px");
    glass.style.setProperty("--y", mouseY + "px");
    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
